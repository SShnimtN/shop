{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card p-4 shadow-sm border-0" style="width: 400px;">
        <h3 class="text-center mb-4 fw-bold text-primary">Вход в аккаунт</h3>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Логин</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Войти</button>
        </form>
        <div class="text-center mt-3">
            <a href="/register" class="text-decoration-none">Регистрация</a>
        </div>
    </div>
</div>
{% endblock %}
