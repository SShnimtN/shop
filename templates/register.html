{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card p-4 shadow-sm border-0" style="width: 400px;">
        <h3 class="text-center mb-4 fw-bold text-primary">Регистрация</h3>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Придумайте логин</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Придумайте пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Создать аккаунт</button>
        </form>
        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
{% endblock %}
