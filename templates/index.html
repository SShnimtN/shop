{% extends 'base.html' %}

{% block content %}
<h1 class="text-center mb-5 fw-bold text-dark">Наш ассортимент</h1>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card h-100 shadow-sm border-0">
            <img src="{{ url_for('static', filename='images/' + product['image']) }}"
                 class="card-img-top" alt="{{ product['title'] }}" style="height: 250px; object-fit: cover;">
            <div class="card-body d-flex flex-column justify-content-between">
                <h5 class="card-title fw-bold text-dark mb-3">{{ product['title'] }}</h5>
                <div>
                    <p class="card-text fs-4 fw-bold text-primary mb-3">{{ product['price'] }} ₽</p>
                    <form action="{{ url_for('add_to_cart', product_id=product['id']) }}" method="POST">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">В корзину</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endfor %} 
</div>
{% endblock %}
